name: Publish to ClawHub

on:
  pull_request:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  # ───────────────── Bundle plugin track ─────────────────
  bundle-dry-run:
    if: github.event_name == 'pull_request'
    uses: openclaw/clawhub/.github/workflows/package-publish.yml@main
    with:
      dry_run: true

  bundle-publish:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      id-token: write
    uses: openclaw/clawhub/.github/workflows/package-publish.yml@main
    with:
      dry_run: false
    secrets:
      clawhub_token: ${{ secrets.CLAWHUB_TOKEN }}

  # ───────────────── 20-skill matrix track ─────────────────
  skills-publish:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        skill:
          - research/keyword-research
          - research/competitor-analysis
          - research/serp-analysis
          - research/content-gap-analysis
          - build/seo-content-writer
          - build/geo-content-optimizer
          - build/meta-tags-optimizer
          - build/schema-markup-generator
          - optimize/on-page-seo-auditor
          - optimize/technical-seo-checker
          - optimize/internal-linking-optimizer
          - optimize/content-refresher
          - monitor/rank-tracker
          - monitor/backlink-analyzer
          - monitor/performance-reporter
          - monitor/alert-manager
          - cross-cutting/content-quality-auditor
          - cross-cutting/domain-authority-auditor
          - cross-cutting/entity-optimizer
          - cross-cutting/memory-management
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install clawhub CLI
        run: npm install -g clawhub
      - name: Login
        run: clawhub login --token "${{ secrets.CLAWHUB_TOKEN }}"
      - name: Resolve version from plugin.json
        id: ver
        run: echo "version=$(jq -r .version .claude-plugin/plugin.json)" >> "$GITHUB_OUTPUT"
      - name: Publish ${{ matrix.skill }}
        run: |
          clawhub skill publish "${{ matrix.skill }}" \
            --version "${{ steps.ver.outputs.version }}" \
            --changelog "Published from ${GITHUB_REF_NAME} @ ${GITHUB_SHA:0:7}" \
            --tags latest \
            --no-input
